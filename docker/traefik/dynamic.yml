# Traefik v3 Dynamic Configuration
# This file is watched for changes (hot reload)

http:
  # HTTP Routers
  routers:
    # Root redirect to API
    root-redirect:
      rule: "Host(`localhost`) && Path(`/`)"
      service: noop@internal
      entryPoints:
        - web
        - websecure
      tls: {}
      middlewares:
        - redirect-to-api
      priority: 100

    # Traefik Dashboard
    dashboard:
      rule: "Host(`traefik.localhost`)"
      service: api@internal
      entryPoints:
        - traefik
      tls: {}
      priority: 100

    # Grafana
    grafana:
      rule: "Host(`grafana.localhost`)"
      service: grafana
      entryPoints:
        - web
        - websecure
      tls: {}
      middlewares:
        - grafana-forwarded
      priority: 50

    # Jaeger
    jaeger:
      rule: "Host(`jaeger.localhost`)"
      service: jaeger
      entryPoints:
        - web
        - websecure
      tls: {}
      priority: 50

    # Prometheus
    prometheus:
      rule: "Host(`prometheus.localhost`)"
      service: prometheus
      entryPoints:
        - web
        - websecure
      tls: {}
      priority: 50

  # Middlewares
  middlewares:
    # Redirect root to API
    redirect-to-api:
      redirectRegex:
        regex: "^https?://localhost/$"
        replacement: "https://localhost/api/v1"
        permanent: false

    # Grafana forwarded headers
    grafana-forwarded:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
          X-Forwarded-Host: "grafana.localhost"
          X-Forwarded-Port: "443"

  # Services
  services:
    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"
        passHostHeader: true

    jaeger:
      loadBalancer:
        servers:
          - url: "http://jaeger:16686"
        passHostHeader: true

    prometheus:
      loadBalancer:
        servers:
          - url: "http://prometheus:9090"
        passHostHeader: true

# TLS Configuration
tls:
  certificates:
    - certFile: /etc/traefik/certs/localhost.pem
      keyFile: /etc/traefik/certs/localhost-key.pem

  # TLS options for security
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
